---
layout: default
---

<section class="page-section">
	<div class="container">
		<header class="page-header fade-in">
			<h1>{{ page.title }}</h1>
			{% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
		</header>
		<div class="page-content fade-in">
			{{ content }}
		</div>
	</div>
</section>
