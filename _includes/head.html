<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="{{ page.robots | default: 'index, follow' }}" />

  {% capture page_title %}{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else
  %}{{ site.title }}{% endif %}{% endcapture %}
  {% assign page_description = page.description | default: site.description %}

  <title>{{ page_title | escape }}</title>
  <meta name="description" content="{{ page_description | escape }}" />
  <meta name="author" content="{{ site.author }}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page_title | escape }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:site_name" content="{{ site.title | escape }}" />
  <meta property="og:description" content="{{ page_description | escape }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  {% seo %}
</head>
